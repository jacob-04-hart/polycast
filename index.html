<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>PolyCast</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				color-scheme: light dark;
				--bg: #f6f7fb;
				--panel: #ffffff;
				--ink: #1f2633;
				--muted: #6f7889;
				--accent: #ff6f3c;
				--accent-soft: #ffd8c9;
				--border: #dbe1eb;
				--surface: #ffffff;
				--surface-soft: #ffffffee;
				--surface-alt: #f8faff;
				--grid-line: rgba(15, 25, 43, 0.07);
				--swatch-border: #d7dce7;
				--swatch-hover-border: #2b3140;
				--swatch-active-border: #1f2633;
				--danger-bg: #2b3140;
				--danger-ink: #ffffff;
				--shadow: 0 8px 30px rgba(15, 25, 43, 0.08);
				--workspace-border: #e5e9f1;
				--workspace-dash: #cbd3e2;
				--body-glow-a: #fff7f0;
				--body-glow-b: #e7efff;
			}

			@media (prefers-color-scheme: dark) {
				:root {
					--bg: #11141b;
					--panel: #171d27;
					--ink: #c8cfdb;
					--muted: #9ca6ba;
					--accent: #ff875b;
					--accent-soft: #3b2a23;
					--border: #2a3447;
					--surface: #1a2230;
					--surface-soft: #1a2230ee;
					--surface-alt: #1d2636;
					--grid-line: rgba(200, 207, 219, 0.1);
					--swatch-border: #3a455b;
					--swatch-hover-border: #b7becd;
					--swatch-active-border: #c8cfdb;
					--danger-bg: #2c364a;
					--danger-ink: #d8deea;
					--shadow: 0 10px 26px rgba(0, 0, 0, 0.45);
					--workspace-border: #2c3850;
					--workspace-dash: #3a4963;
					--body-glow-a: #2b1d1a;
					--body-glow-b: #1b2435;
				}
			}

			* {
				box-sizing: border-box;
			}

			canvas {
				user-select: none;
				-webkit-user-select: none;
				-webkit-user-drag: none;
				touch-action: none;
			}

			body {
				margin: 0;
				min-height: 100vh;
				font-family: "Outfit", sans-serif;
				color: var(--ink);
				background:
					radial-gradient(circle at 0% 0%, var(--body-glow-a) 0%, transparent 38%),
					radial-gradient(circle at 100% 100%, var(--body-glow-b) 0%, transparent 45%),
					var(--bg);
				display: block;
				padding: 1rem;
			}

			.app {
				width: 100%;
				display: grid;
				grid-template-columns: 320px max-content minmax(600px, 1fr);
				gap: 1rem;
				align-items: start;
			}

			.panel,
			.workspace {
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 18px;
				box-shadow: var(--shadow);
			}

			.panel {
				padding: 1rem;
				display: flex;
				flex-direction: column;
				gap: 1rem;
				position: sticky;
				top: 1rem;
			}

			h1 {
				font-size: 1.35rem;
				margin: 0;
			}

			.controls {
				display: grid;
				gap: 0.6rem;
			}

			.control-group {
				display: grid;
				gap: 0.55rem;
				padding-top: 0.35rem;
				border-top: 1px dashed var(--border);
			}

			.group-title {
				font-size: 0.88rem;
				letter-spacing: 0.03em;
				text-transform: uppercase;
				color: var(--muted);
				font-weight: 700;
			}

			.controls button {
				border: 1px solid var(--border);
				background: var(--surface);
				padding: 0.72rem 0.9rem;
				border-radius: 11px;
				color: var(--ink);
				font: inherit;
				text-align: left;
				cursor: pointer;
				transition: 160ms ease;
			}

			.controls button:hover {
				border-color: var(--accent);
				background: var(--accent-soft);
				transform: translateY(-1px);
			}

			.row {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 0.6rem;
			}

			.color-grid {
				display: grid;
				grid-template-columns: repeat(4, minmax(0, 1fr));
				gap: 0.45rem;
			}

			.color-swatch {
				width: 100%;
				height: 34px;
				border: 2px solid var(--swatch-border);
				border-radius: 10px;
				padding: 0;
				display: grid;
				place-items: center;
				font-size: 0.78rem;
				font-weight: 700;
				cursor: pointer;
				transition: transform 140ms ease, border-color 140ms ease;
			}

			.color-swatch:hover {
				transform: translateY(-1px);
				border-color: var(--swatch-hover-border);
			}

			.color-swatch.active {
				border-color: var(--swatch-active-border);
				box-shadow: 0 0 0 2px #1f263322;
			}

			.danger {
				margin-top: auto;
				border: none;
				border-radius: 11px;
				padding: 0.72rem 0.9rem;
				background: var(--danger-bg);
				color: var(--danger-ink);
				font: inherit;
				cursor: pointer;
			}

			.rules-area {
				display: grid;
				gap: 0.9rem;
				align-content: start;
				justify-self: start;
			}

			.rule-card {
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 18px;
				padding: 0.85rem;
				box-shadow: var(--shadow);
				display: grid;
				gap: 0.7rem;
				width: max-content;
				position: relative;
			}

			.rule-remove-btn {
				position: absolute;
				top: 0.38rem;
				right: 0.42rem;
				border: 1px solid var(--border);
				background: var(--surface);
				color: var(--ink);
				font: inherit;
				font-size: 0.95rem;
				line-height: 1;
				width: 24px;
				height: 24px;
				border-radius: 8px;
				cursor: pointer;
			}

			.rule-move-btn {
				position: absolute;
				top: 0.38rem;
				border: 1px solid var(--border);
				background: var(--surface);
				color: var(--ink);
				font: inherit;
				font-size: 0.9rem;
				line-height: 1;
				width: 24px;
				height: 24px;
				border-radius: 8px;
				cursor: pointer;
			}

			.rule-move-up-btn {
				right: 2.25rem;
			}

			.rule-move-down-btn {
				right: 4.08rem;
			}

			.rule-duplicate-btn {
				position: absolute;
				top: 0.38rem;
				right: 5.91rem;
				border: 1px solid var(--border);
				background: var(--surface);
				color: var(--ink);
				font: inherit;
				font-size: 0.9rem;
				line-height: 1;
				width: 24px;
				height: 24px;
				border-radius: 8px;
				cursor: pointer;
			}

			.rule-drag-handle-btn {
				position: absolute;
				top: 0.38rem;
				right: 7.74rem;
				border: 1px dashed var(--border);
				background: var(--surface-soft);
				color: var(--ink);
				font: inherit;
				font-size: 0.9rem;
				line-height: 1;
				width: 24px;
				height: 24px;
				border-radius: 8px;
				cursor: grab;
			}

			.rule-dragging {
				opacity: 0.7;
			}

			.rule-drop-target {
				outline: 2px dashed var(--accent);
				outline-offset: 4px;
			}

			.rule-remove-btn:hover {
				border-color: var(--accent);
				background: var(--accent-soft);
			}

			.rule-move-btn:hover {
				border-color: var(--accent);
				background: var(--accent-soft);
			}

			.rule-duplicate-btn:hover {
				border-color: var(--accent);
				background: var(--accent-soft);
			}

			.rule-drag-handle-btn:hover {
				border-color: var(--accent);
				background: var(--accent-soft);
			}

			.rule-move-btn:disabled {
				opacity: 0.4;
				cursor: not-allowed;
				filter: grayscale(0.5);
			}

			.add-rule-btn {
				border: 1px solid var(--border);
				background: var(--surface);
				color: var(--ink);
				font: inherit;
				font-size: 1.2rem;
				line-height: 1;
				width: 32px;
				height: 32px;
				border-radius: 10px;
				cursor: pointer;
			}

			.rules-add-btn {
				position: sticky;
				top: 0.7rem;
				z-index: 5;
				align-self: start;
				justify-self: center;
			}

			.rule-workspaces {
				display: grid;
				grid-template-columns: repeat(2, 320px);
				gap: 0.7rem;
				max-width: none;
			}

			.workspace {
				width: 320px;
				aspect-ratio: 1 / 1;
				min-height: 320px;
				max-height: 320px;
				border-radius: 14px;
				border: 1px solid var(--workspace-border);
				background:
					linear-gradient(90deg, var(--grid-line) 1px, transparent 1px) 0 0 / 26px 26px,
					linear-gradient(var(--grid-line) 1px, transparent 1px) 0 0 / 26px 26px,
					var(--surface-alt);
			}

			.output-panel {
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 18px;
				box-shadow: var(--shadow);
				padding: 1rem;
				position: sticky;
				top: 1rem;
				display: grid;
				grid-template-rows: 1fr;
				height: calc(100vh - 2rem);
				min-height: 360px;
			}

			.output-overlay {
				position: absolute;
				top: 0.55rem;
				left: 0.55rem;
				display: flex;
				align-items: center;
				gap: 0.35rem;
				z-index: 3;
			}

			.output-icon-btn {
				border: 1px solid var(--border);
				background: var(--surface);
				color: var(--ink);
				border-radius: 8px;
				width: 34px;
				height: 34px;
				padding: 0;
				font: inherit;
				font-size: 1.05rem;
				line-height: 1;
				display: grid;
				place-items: center;
				cursor: pointer;
				transition: 150ms ease;
			}

			.output-icon-btn:hover {
				border-color: var(--accent);
				background: var(--accent-soft);
			}

			.output-toggle-btn {
				border: 1px solid var(--border);
				background: var(--surface-soft);
				color: var(--ink);
				border-radius: 999px;
				padding: 0.28rem 0.65rem;
				font: inherit;
				font-size: 0.72rem;
				line-height: 1;
				letter-spacing: 0.01em;
				cursor: pointer;
				transition: 150ms ease;
			}

			.output-toggle-btn:hover {
				border-color: var(--accent);
				background: var(--accent-soft);
			}

			.output-toggle-btn[aria-pressed="true"] {
				border-color: var(--accent);
				background: var(--accent-soft);
			}

			.output-icon-btn[aria-pressed="true"] {
				border-color: var(--accent);
				background: var(--accent-soft);
			}

			.output-icon-btn[aria-pressed="false"] {
				opacity: 0.72;
			}

			.output-icon-btn:disabled {
				opacity: 0.4;
				cursor: not-allowed;
				filter: grayscale(0.5);
			}

			.output-max {
				display: flex;
				align-items: center;
				gap: 0.3rem;
				padding: 0.15rem 0.4rem;
				border: 1px solid var(--border);
				border-radius: 8px;
				background: var(--surface-soft);
				font-size: 0.72rem;
				color: var(--muted);
			}

			.output-max input {
				width: 72px;
				border: 1px solid var(--swatch-border);
				border-radius: 6px;
				padding: 0.18rem 0.3rem;
				color: var(--ink);
				background: var(--surface);
				font: inherit;
				font-size: 0.76rem;
			}

			.output-speed {
				display: flex;
				align-items: center;
				gap: 0.35rem;
				padding: 0.15rem 0.4rem;
				border: 1px solid var(--border);
				border-radius: 8px;
				background: var(--surface-soft);
				font-size: 0.72rem;
				color: var(--muted);
			}

			.output-speed input[type="range"] {
				width: 96px;
			}

			.output-window {
				min-height: 0;
				border-radius: 12px;
				border: 1px dashed var(--workspace-dash);
				background: linear-gradient(180deg, var(--surface), var(--surface-alt));
				padding: 0;
				display: flex;
				flex: 1;
				overflow: hidden;
				position: relative;
			}

			.output-workspace {
				width: 100%;
				min-height: 0;
				height: 100%;
				max-height: none;
				aspect-ratio: auto;
				flex: 1;
			}

			@media (max-width: 1320px) {
				.app {
					grid-template-columns: 320px minmax(0, 1fr);
				}

				.output-panel {
					grid-column: 1 / -1;
					position: static;
					min-height: 220px;
				}

				.output-window {
					min-height: 140px;
				}
			}

			@media (max-width: 900px) {
				.app {
					grid-template-columns: 1fr;
				}

				.panel {
					position: static;
				}

				.rule-workspaces {
					grid-template-columns: 1fr;
				}

				.workspace {
					width: 100%;
					max-height: none;
					min-height: 200px;
				}
			}
		</style>
	</head>
	<body>
		<main class="app">
			<section class="panel">
				<div>
					<h1>PolyCast</h1>
				</div>

				<div class="controls" id="spawn-controls"></div>

				<div class="control-group">
					<div class="group-title">Rotate Selected</div>
					<div class="row">
						<button id="rotate-left-btn" type="button">CC (Q)</button>
						<button id="rotate-right-btn" type="button">CW (E)</button>
					</div>
				</div>

				<div class="control-group">
					<div class="group-title">Edge Anchors</div>
					<input id="edge-anchor-divisions" type="range" min="1" max="7" step="1" value="2" />
					<div class="group-title" id="edge-anchor-label">midpoint</div>
				</div>

				<div class="control-group">
					<div class="group-title">Color Selected</div>
					<div id="color-controls" class="color-grid"></div>
				</div>

				<div class="control-group">
					<div class="group-title">Scene JSON</div>
					<div class="row">
						<button id="save-btn" type="button">Save Scene</button>
						<button id="load-btn" type="button">Load Scene</button>
					</div>
					<input id="load-input" type="file" accept="application/json" hidden />
				</div>

				<button id="clear-btn" class="danger">Clear Selected Canvas</button>
				<button id="clear-all-btn" class="danger" type="button">Clear All</button>
			</section>

			<section class="rules-area" id="rules-container">
				<!-- Rules are rendered by main.js -->
			</section>

			<aside class="output-panel">
				<div class="output-window">
					<div class="output-overlay">
						<button id="apply-rules-btn" class="output-icon-btn" type="button" title="Iterate once">⟳</button>
						<button id="reset-output-btn" class="output-icon-btn" type="button" title="Reset output">↺</button>
						<button id="reset-output-zoom-btn" class="output-icon-btn" type="button" title="Reset zoom">⌂</button>
						<button id="save-output-png-btn" class="output-icon-btn" type="button" title="Save output PNG">⤓</button>
						<button id="play-rules-btn" class="output-icon-btn" type="button" title="Play iterations">▶</button>
						<button id="toggle-output-arrows-btn" class="output-toggle-btn" type="button" title="Toggle arrows">arrows on</button>
						<button id="toggle-output-tiny-shapes-btn" class="output-toggle-btn" type="button" title="Toggle tiny shape purge">tiny purge on</button>
						<label class="output-max" for="play-max-shapes">
							<span>max</span>
							<input id="play-max-shapes" type="number" min="1" step="1" value="500" />
						</label>
						<label class="output-speed" for="play-delay-ms">
							<span>speed</span>
							<input id="play-delay-ms" type="range" min="0" max="500" step="10" value="380" />
						</label>
					</div>
					<div id="output-workspace" class="workspace output-workspace"></div>
				</div>
			</aside>
		</main>

		<script src="https://cdn.jsdelivr.net/npm/konva@9.3.14/konva.min.js"></script>
		<script src="./main.js"></script>
	</body>
</html>
